version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: social_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres-admin
      POSTGRES_PASSWORD: Admin@123
      POSTGRES_DB: social
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: social_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nestjs:
    build: .
    container_name: social_nestjs
    restart: always
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: dev
      POSTGRES_USER: postgres-admin
      POSTGRES_PASSWORD: Admin@123
      POSTGRES_DB: social
    depends_on:
      - postgres
      - redis
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
