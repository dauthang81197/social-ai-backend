name: CI/CD for NestJS Application

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Cập nhật lên phiên bản mới nhất

      - name: Set up Node.js
        uses: actions/setup-node@v3 # Cập nhật lên phiên bản mới nhất
        with:
          node-version: '18'

      - name: Install dependencies with Yarn
        run: yarn install

      - name: Run Lint
        run: yarn lint

  build:
    runs-on: self-hosted
    needs: lint # Job build sẽ chỉ chạy nếu job lint thành công

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Cập nhật lên phiên bản mới nhất

      - name: Set up Node.js
        uses: actions/setup-node@v3 # Cập nhật lên phiên bản mới nhất
        with:
          node-version: '18'

      - name: Install dependencies with Yarn
        run: yarn install

      - name: Build the application
        run: yarn build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image using Buildx
        run: docker buildx build --platform linux/amd64 -t social-ai-backend --load .

  deploy:
    runs-on: self-hosted
    needs: build # Job deploy chỉ chạy nếu job build thành công

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Cập nhật lên phiên bản mới nhất

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Cập nhật lên phiên bản mới nhất

      - name: Cache Docker layers
        uses: actions/cache@v3 # Cập nhật lên phiên bản mới nhất
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        run: |
          docker build -t social-ai-backend .

      - name: Copy code to VPS
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          source: "."  # current dir (GitHub runner workspace)
          target: "/home/thang-server/apps/social-ai-backend"
          strip_components: 1

      - name: Deploy via docker-compose
        run: |
          cd /home/thang-server/apps/social-ai-backend
          docker-compose down
          docker-compose up -d --build

      - name: Notify Telegram on Success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ CI/CD Build Thành công! 🚀"

      - name: Notify Telegram on Failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="❌ Build thất bại trong job *${{ github.job }}* 🚨

          🕒 Thời gian: $(date +'%Y-%m-%d %H:%M:%S')
          🔗 Repo: [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
          🔗 Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
    


